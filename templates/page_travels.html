{% include "_header.html" %}

<main>
        <div class="travel_container">
                {% for travel in travels %}
                        <div class="template">
                                <div class="grid_1">
                                        <h2>
                                              <span>Title:</span> {{ travel.title }}
                                        </h2>
                                </div>
                                <div class="grid_2">
                                        <p>
                                                <span>Country:</span> {{ travel.country }}
                                        </p>
                                        <p>
                                                <span>Location:</span> {{ travel.location }}
                                        </p>
                                        <p>
                                                <span>Start date:</span> {{ travel.start_date }}
                                        </p>
                                        <p>
                                                <span>End date:</span> {{ travel.end_date }}
                                        </p>
                                        <p>
                                                <span>Description:</span> {{ travel.description }}
                                        </p>
                                </div>
                        </div>
                {% endfor %}
        </div>
</main>

{% include "_footer.html" %}
